<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'">
  <title>TikTok 授权回调</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7f9;
      color: #161823;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main {
      width: min(640px, 100%);
      background: #fff;
      border: 1px solid #e7e8ea;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 12px 36px rgba(22, 24, 35, .08);
    }
    h1 { margin: 0 0 12px; font-size: 26px; }
    p { line-height: 1.6; color: #5a5b66; }
    .status {
      margin: 22px 0;
      padding: 14px 16px;
      border-radius: 10px;
      background: #f1f8f5;
      color: #087a55;
      font-weight: 650;
    }
    .status.error { background: #fff1f1; color: #b42318; }
    label { display: block; margin-bottom: 8px; font-weight: 650; }
    textarea {
      width: 100%;
      min-height: 112px;
      resize: vertical;
      padding: 12px;
      border: 1px solid #d9dadd;
      border-radius: 8px;
      font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
      word-break: break-all;
    }
    button {
      margin-top: 12px;
      border: 0;
      border-radius: 8px;
      padding: 11px 18px;
      color: #fff;
      background: #fe2c55;
      font-weight: 650;
      cursor: pointer;
    }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .hint { margin-bottom: 0; font-size: 14px; }
    [hidden] { display: none !important; }
  </style>
</head>
<body>
  <main>
    <h1>TikTok Marketing API 授权</h1>
    <p>此页面用于接收 TikTok API for Business 的 OAuth 授权结果。</p>

    <div id="status" class="status">正在检查授权结果…</div>

    <section id="success" hidden>
      <label for="auth-code">授权码（Auth Code）</label>
      <textarea id="auth-code" readonly spellcheck="false"></textarea>
      <button id="copy" type="button">复制授权码</button>
      <p class="hint">授权码通常具有较短有效期，请尽快用它换取 Access Token。不要把授权码或 Access Token 发到群聊或提交到 GitHub。</p>
    </section>

    <section id="failure" hidden>
      <p id="error-detail"></p>
      <p class="hint">请返回 TikTok API for Business 开发者后台重新发起授权。</p>
    </section>
  </main>

  <script>
    (() => {
      const params = new URLSearchParams(window.location.search);
      const authCode = params.get("auth_code") || params.get("code");
      const error = params.get("error") || params.get("error_code");
      const errorDescription = params.get("error_description") || params.get("description");

      if (window.history && window.history.replaceState) {
        window.history.replaceState({}, document.title, window.location.pathname);
      }

      const status = document.getElementById("status");
      const success = document.getElementById("success");
      const failure = document.getElementById("failure");
      const codeField = document.getElementById("auth-code");
      const copyButton = document.getElementById("copy");

      if (authCode) {
        status.textContent = "授权成功";
        codeField.value = authCode;
        success.hidden = false;

        copyButton.addEventListener("click", async () => {
          try {
            await navigator.clipboard.writeText(authCode);
            copyButton.textContent = "已复制";
          } catch {
            codeField.focus();
            codeField.select();
            document.execCommand("copy");
            copyButton.textContent = "已复制";
          }
        });
        return;
      }

      status.classList.add("error");
      status.textContent = error ? "授权失败" : "未检测到授权结果";
      document.getElementById("error-detail").textContent = errorDescription || error || "URL 中没有 auth_code 参数。";
      failure.hidden = false;
    })();
  </script>
</body>
</html>
